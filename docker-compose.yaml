# dopplerhq/cli is a CLI tool — no web server, no exposed ports
# Use: docker run --rm dopplerhq/cli run -- <your-command>
# Or as a sidecar to inject secrets into other services

name: doppler
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "5m"
    max-file: "1"

services:
  app:
    image: dopplerhq/cli:latest
    pull_policy: always
    container_name: doppler-app
    restart: "no"
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      DOPPLER_TOKEN: ${APP_API_TOKEN:-your_doppler_service_token_here}
      CONTAINER_NAME: doppler-app
    volumes:
      - ./volumes/config/doppler:/root/.doppler
    networks:
      - doppler

networks:
  doppler:
    name: doppler
    external: false
